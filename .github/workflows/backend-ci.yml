# .github/workflows/backend-ci.yml
# Runs automatically on every push and Pull Request to main
# Installs dependencies and runs your tests

name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sasafix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/sasafix_test" >> $GITHUB_ENV
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> $GITHUB_ENV
          echo "ALGORITHM=HS256" >> $GITHUB_ENV
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=1440" >> $GITHUB_ENV
          echo "SENDGRID_API_KEY=placeholder" >> $GITHUB_ENV
          echo "BASE_URL=http://localhost:5173" >> $GITHUB_ENV

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest server/tests/ -v